<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80">
  <!-- no background -->
  <!-- UC Berkeley Seal -->
  <g transform="translate(40, 40)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#003262" stroke-width="1.8"/>
    <circle cx="0" cy="0" r="26.5" fill="none" stroke="#003262" stroke-width="0.6"/>
    <!-- Gold fill inner -->
    <circle cx="0" cy="0" r="25" fill="#FDB515" opacity="0.15"/>
    <!-- Text along top arc: UNIVERSITY OF CALIFORNIA -->
    <text font-family="Arial,Helvetica,sans-serif" font-size="4.2" fill="#003262" text-anchor="middle" letter-spacing="0.8" font-weight="600">
      <textPath href="#sealArcTop">UNIVERSITY OF CALIFORNIA</textPath>
    </text>
    <path id="sealArcTop" d="M-22,-16 A28,28 0 0,1 22,-16" fill="none"/>
    <!-- Text along bottom arc: BERKELEY -->
    <text font-family="Arial,Helvetica,sans-serif" font-size="5" fill="#003262" text-anchor="middle" letter-spacing="1.5" font-weight="700">
      <textPath href="#sealArcBot" startOffset="50%">BERKELEY</textPath>
    </text>
    <path id="sealArcBot" d="M-20,20 A28,28 0 0,0 20,20" fill="none"/>
    <!-- Open book in center -->
    <path d="M-8,-2 L-8,8 L0,6 L8,8 L8,-2 L0,0 Z" fill="none" stroke="#003262" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="0" y2="6" stroke="#003262" stroke-width="0.5"/>
    <!-- Lines on book pages -->
    <line x1="-6" y1="1" x2="-1.5" y2="2" stroke="#003262" stroke-width="0.3"/>
    <line x1="-6" y1="3" x2="-1.5" y2="3.5" stroke="#003262" stroke-width="0.3"/>
    <line x1="-6" y1="5" x2="-1.5" y2="4.8" stroke="#003262" stroke-width="0.3"/>
    <line x1="1.5" y1="2" x2="6" y2="1" stroke="#003262" stroke-width="0.3"/>
    <line x1="1.5" y1="3.5" x2="6" y2="3" stroke="#003262" stroke-width="0.3"/>
    <line x1="1.5" y1="4.8" x2="6" y2="5" stroke="#003262" stroke-width="0.3"/>
    <!-- Star above book -->
    <polygon points="0,-8 1.2,-5.5 3.8,-5.5 1.8,-3.8 2.6,-1.3 0,-3 -2.6,-1.3 -1.8,-3.8 -3.8,-5.5 -1.2,-5.5" fill="#FDB515" stroke="#003262" stroke-width="0.3"/>
    <!-- Year -->
    <text x="-12" y="12" font-family="Georgia,serif" font-size="4.5" fill="#003262" font-style="italic">18</text>
    <text x="8" y="12" font-family="Georgia,serif" font-size="4.5" fill="#003262" font-style="italic">68</text>
    <!-- Decorative dots on sides -->
    <circle cx="-23" cy="0" r="1" fill="#003262"/>
    <circle cx="23" cy="0" r="1" fill="#003262"/>
  </g>
  <!-- Berkeley text -->
  <text x="85" y="42" font-family="Georgia,'Times New Roman',serif" font-size="36" fill="#003262" font-weight="400">Berkeley</text>
  <!-- UNIVERSITY OF CALIFORNIA -->
  <text x="86" y="60" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#003262" letter-spacing="1.5" font-weight="600">UNIVERSITY OF CALIFORNIA</text>
</svg>