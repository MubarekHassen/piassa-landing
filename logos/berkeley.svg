<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 70">
  <!-- UC Berkeley Logo - Seal + Berkeley wordmark -->
  <!-- Simplified UC Seal -->
  <g transform="translate(32, 35)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#003262" stroke-width="2.2"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#003262" stroke-width="0.8"/>
    <!-- Gold inner fill -->
    <circle cx="0" cy="0" r="23" fill="#FDB515" opacity="0.2"/>
    <!-- Open book -->
    <path d="M-7,-1 L-7,7 L0,5 L7,7 L7,-1 L0,1 Z" fill="none" stroke="#003262" stroke-width="0.9"/>
    <line x1="0" y1="1" x2="0" y2="5" stroke="#003262" stroke-width="0.5"/>
    <!-- Star above book -->
    <polygon points="0,-7 1,-4.8 3.2,-4.8 1.5,-3.2 2.2,-1 0,-2.5 -2.2,-1 -1.5,-3.2 -3.2,-4.8 -1,-4.8" fill="#FDB515" stroke="#003262" stroke-width="0.3"/>
    <!-- Text along arcs -->
    <defs>
      <path id="topArc" d="M-20,-14 A26,26 0 0,1 20,-14"/>
      <path id="botArc" d="M-18,18 A26,26 0 0,0 18,18"/>
    </defs>
    <text font-family="Arial,sans-serif" font-size="4" fill="#003262" letter-spacing="0.8" font-weight="600">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">UNIVERSITY OF CALIFORNIA</textPath>
    </text>
    <!-- Year -->
    <text x="-11" y="12" font-family="Georgia,serif" font-size="4.5" fill="#003262" font-style="italic">18</text>
    <text x="7" y="12" font-family="Georgia,serif" font-size="4.5" fill="#003262" font-style="italic">68</text>
  </g>
  <!-- "Berkeley" wordmark -->
  <text x="74" y="42" font-family="Georgia,'Times New Roman',serif" font-size="38" fill="#003262" font-weight="400">Berkeley</text>
  <!-- UNIVERSITY OF CALIFORNIA subtitle -->
  <text x="75" y="60" font-family="Arial,Helvetica,sans-serif" font-size="10.5" fill="#003262" letter-spacing="1.2" font-weight="600">UNIVERSITY OF CALIFORNIA</text>
</svg>
