<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80">
  <!-- Harvard Business School Official Logo -->
  <!-- Crimson Shield -->
  <g transform="translate(8, 2)">
    <!-- Shield shape -->
    <path d="M0,0 L52,0 L52,46 L26,68 L0,46 Z" fill="#A41034"/>
    <!-- White inner border -->
    <path d="M3,3 L49,3 L49,44 L26,64 L3,44 Z" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
    <!-- Horizontal divider -->
    <line x1="5" y1="36" x2="47" y2="36" stroke="#FFFFFF" stroke-width="0.8"/>

    <!-- Top section: Two books side by side -->
    <!-- Left book -->
    <rect x="7" y="12" width="17" height="12" rx="0.5" fill="#FFFFFF"/>
    <!-- Right book -->
    <rect x="28" y="12" width="17" height="12" rx="0.5" fill="#FFFFFF"/>

    <!-- Book text -->
    <text x="15.5" y="21" font-family="Georgia,'Times New Roman',serif" font-size="6.5" fill="#A41034" text-anchor="middle" font-weight="700">VE</text>
    <text x="36.5" y="21" font-family="Georgia,'Times New Roman',serif" font-size="6.5" fill="#A41034" text-anchor="middle" font-weight="700">RI</text>

    <!-- Decorative trefoils/crosses above books -->
    <g fill="#FFFFFF">
      <circle cx="13" cy="8" r="1.5"/>
      <circle cx="20" cy="8" r="1.5"/>
      <circle cx="26" cy="8" r="1.5"/>
      <circle cx="32" cy="8" r="1.5"/>
      <circle cx="39" cy="8" r="1.5"/>
    </g>

    <!-- Decorative elements between books -->
    <circle cx="26" cy="18" r="1.3" fill="#FFFFFF"/>

    <!-- Bottom section: One book centered -->
    <rect x="15" y="39" width="22" height="10" rx="0.5" fill="#FFFFFF"/>
    <text x="26" y="47" font-family="Georgia,'Times New Roman',serif" font-size="6.5" fill="#A41034" text-anchor="middle" font-weight="700">TAS</text>

    <!-- Decorative trefoils below divider, flanking bottom book -->
    <g fill="#FFFFFF">
      <circle cx="10" cy="43" r="1.3"/>
      <circle cx="42" cy="43" r="1.3"/>
      <circle cx="10" cy="50" r="1.2"/>
      <circle cx="42" cy="50" r="1.2"/>
      <!-- Small dots near shield point -->
      <circle cx="18" cy="54" r="1"/>
      <circle cx="34" cy="54" r="1"/>
      <circle cx="26" cy="57" r="1"/>
    </g>
  </g>

  <!-- Vertical crimson divider -->
  <line x1="72" y1="10" x2="72" y2="68" stroke="#A41034" stroke-width="1.5"/>

  <!-- Stacked text in crimson -->
  <text x="84" y="30" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#A41034" font-weight="400">Harvard</text>
  <text x="84" y="52" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#1a1a1a" font-weight="700">Business</text>
  <text x="84" y="72" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#A41034" font-weight="400">School</text>
</svg>
