<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 90">
  <!-- MIT Logo — Letterbar + "Massachusetts Institute of Technology" -->
  <!-- Bar widths: 18px each, gaps within letter: 4px, gaps between letters: 10px -->
  <!-- Colors: MIT Red #A31F34, Gray #8A8B8C -->

  <!-- Letter M — 3 bars descending -->
  <rect x="8" y="6" width="18" height="72" fill="#A31F34"/>
  <rect x="30" y="18" width="18" height="60" fill="#A31F34"/>
  <rect x="52" y="18" width="18" height="60" fill="#A31F34"/>

  <!-- Letter I — 1 short red + 1 taller gray -->
  <rect x="82" y="38" width="18" height="40" fill="#A31F34"/>
  <rect x="104" y="18" width="18" height="60" fill="#8A8B8C"/>

  <!-- Letter T — 1 tall red + 1 medium red -->
  <rect x="134" y="6" width="18" height="72" fill="#A31F34"/>
  <rect x="156" y="18" width="18" height="60" fill="#A31F34"/>

  <!-- "Massachusetts Institute of Technology" stacked text -->
  <text x="196" y="32" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="23" fill="#A31F34" font-weight="700">Massachusetts</text>
  <text x="196" y="54" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="23" fill="#A31F34" font-weight="700">Institute of</text>
  <text x="196" y="76" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="23" fill="#A31F34" font-weight="700">Technology</text>
</svg>
